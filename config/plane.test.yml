version: 1

# Test configuration for plane
# Uses /tmp paths so tests don't touch real system state

paths:
  base: /tmp/plane-test
  socket: /tmp/plane-test/plane.sock
  logs: /tmp/plane-test/logs
  state_file: /tmp/plane-test/plane-state.json

daemon:
  status_poll_interval_secs: 5
  log_buffer_lines: 500
  config_watch: false
  shutdown_timeout_secs: 10

dns:
  enabled: true
  port: 15353
  domain: plane.local
  ttl: 5

# Native services
services:
  # Simple echo service for testing
  echo-service:
    command: ["/bin/echo", "hello from plane"]
    working_dir: /tmp/plane-test
    restart_policy: never
    log_file: echo.log

  # Long-running service for lifecycle testing
  sleep-service:
    command: ["/bin/sleep", "3600"]
    working_dir: /tmp/plane-test
    restart_policy: always
    max_restarts: 3
    restart_backoff_secs: 2
    log_file: sleep.log

# Containers
containers:
  # Test nginx container
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - /tmp/plane-test/nginx.conf:/etc/nginx/nginx.conf
    health_check:
      type: tcp
      port: 80
      interval_secs: 10
      failure_threshold: 2
      auto_restart: true

# Scheduled jobs
schedules:
  # Ping monitor cronjob
  ping-monitor:
    command: ["ping", "-c", "1", "8.8.8.8"]
    working_dir: /tmp/plane-test
    interval_seconds: 60
    timeout_secs: 10
    log_file: ping-monitor.log

  # Periodic health report
  health-report:
    command: ["echo", "Health check passed"]
    working_dir: /tmp/plane-test
    interval_seconds: 300
    timeout_secs: 5
    log_file: health-report.log
